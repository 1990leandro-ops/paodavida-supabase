name: Deploy Supabase Functions

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy functions
        run: |
          supabase functions deploy admin-send-notification --no-verify-jwt --project-ref "${SUPABASE_PROJECT_REF}"
          supabase functions deploy admin-galeria-upload    --no-verify-jwt --project-ref "${SUPABASE_PROJECT_REF}"
          supabase functions deploy admin-pedidos-list      --no-verify-jwt --project-ref "${SUPABASE_PROJECT_REF}"
          supabase functions deploy admin-pedidos-update    --no-verify-jwt --project-ref "${SUPABASE_PROJECT_REF}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
