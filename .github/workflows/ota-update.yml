name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Mensagem da atualização"
        required: true
        default: "atualização"
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm install

      - name: Publish OTA update
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npx eas-cli update --branch production --message "${{ github.event.inputs.message }}" --non-interactive
          else
            npx eas-cli update --branch production --message "Update automático via GitHub Actions" --non-interactive
          fi
