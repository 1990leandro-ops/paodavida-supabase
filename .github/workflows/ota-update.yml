name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Mensagem da atualização'
        required: true
        default: 'atualização'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: eas update --branch production --message "${{ github.event.inputs.message }}" --non-interactive
